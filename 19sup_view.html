<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>緊急:河内長野市 エリア確認</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>body{margin:0}#map{height:100vh}</style>
</head>
<body>
  <div id="map"></div>
  <script>
    const map = L.map('map').setView([34.45, 135.58], 15);
    L.tileLayer('https://cyberjapandata.gsi.go.jp/xyz/std/{z}/{x}/{y}.png', {maxZoom:19}).addTo(map);
    L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {maxZoom:19, opacity:0.3}).addTo(map);

    fetch('19sup_town.geojson')
      .then(r => r.json())
      .then(data => {
        L.geoJSON(data, {style: {fillColor: "#2e7d32", fillOpacity: 0.3, color: "#333", weight: 2}}).addTo(map);
      });
  </script>
</body>
</html>
