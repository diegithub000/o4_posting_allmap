<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>管理画面 - ポリゴン編集</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.js"></script>
  <style>body{margin:0}#map{height:100vh}</style>
</head>
<body>
  <div id="map"></div>
  <script>
    const map = L.map('map').setView([34.69, 135.54], 14);
    L.tileLayer('https://cyberjapandata.gsi.go.jp/xyz/std/{z}/{x}/{y}.png', {maxZoom:19}).addTo(map);
    L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {maxZoom:19, opacity:0.3}).addTo(map);

    const drawnItems = new L.FeatureGroup();
    map.addLayer(drawnItems);

    // 既存のcustom.geojsonをロード（あれば編集可能に）
    fetch('custom.geojson')
      .then(r => r.json())
      .then(data => {
        L.geoJSON(data, {
          onEachFeature: (feature, layer) => drawnItems.addLayer(layer)
        });
      })
      .catch(() => { /* 初回は空 */ });

    const drawControl = new L.Control.Draw({
      edit: { featureGroup: drawnItems },
      draw: { polygon: true, rectangle: true, circle: false, marker: false, polyline: false }
    });
    map.addControl(drawControl);

    map.on('draw:created', e => {
      const layer = e.layer;
      const tanto = prompt("このポリゴンの担当者名を入力（例：日本太郎）");
      if (!tanto) return;
      layer.feature = {type:"Feature", properties:{CITY:"118", KEY_CODE:"NEW_"+Date.now(), tanto: tanto.trim(), status:"未完了", S_NAME:"手動追加"}};
      drawnItems.addLayer(layer);
    });

    const saveBtn = document.createElement('button');
    saveBtn.innerHTML = '✅ custom.geojson に保存（上書き）';
    saveBtn.style.position='absolute'; saveBtn.style.bottom='20px'; saveBtn.style.left='20px'; saveBtn.style.zIndex=1000;
    saveBtn.onclick = () => {
      const data = drawnItems.toGeoJSON();
      const blob = new Blob([JSON.stringify(data)], {type:'application/json'});
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'custom.geojson';
      a.click();
    };
    document.body.appendChild(saveBtn);
  </script>
</body>
</html>
