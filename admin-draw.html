<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>城東区 管理者ポリゴン描画</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.js"></script>
  <style>
    body { margin:0; }
    #map { height: 100vh; }
    .leaflet-draw-toolbar { top: 10px; left: 10px; }
  </style>
</head>
<body>
  <div id="map"></div>

  <script>
    const map = L.map('map').setView([34.692, 135.55], 15); // 城東区中心

    L.tileLayer('https://cyberjapandata.gsi.go.jp/xyz/std/{z}/{x}/{y}.png', {
      maxZoom: 19, attribution: '国土地理院'
    }).addTo(map);

    // 建物輪郭も表示
    L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom: 19, opacity: 0.3
    }).addTo(map);

    const drawnItems = new L.FeatureGroup();
    map.addLayer(drawnItems);

    const drawControl = new L.Control.Draw({
      edit: { featureGroup: drawnItems },
      draw: {
        polygon: { shapeOptions: { color: '#ff0000', fillOpacity: 0.4 } },
        rectangle: true,
        circle: false, circlemarker: false, marker: false, polyline: false
      }
    });
    map.addControl(drawControl);

    map.on('draw:created', e => {
      const layer = e.layer;
      drawnItems.addLayer(layer);
    });

    // 保存ボタン（右クリックメニューや別途追加）
    const saveBtn = document.createElement('button');
    saveBtn.innerHTML = '✅ GeoJSON保存（4ku_town.geojson）';
    saveBtn.style.position = 'absolute';
    saveBtn.style.bottom = '20px';
    saveBtn.style.left = '20px';
    saveBtn.style.zIndex = 1000;
    saveBtn.onclick = () => {
      const data = drawnItems.toGeoJSON();
      const blob = new Blob([JSON.stringify(data)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = '4ku_town.geojson';
      a.click();
    };
    document.body.appendChild(saveBtn);
  </script>
</body>
</html>
